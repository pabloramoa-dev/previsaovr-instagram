name: Carrossel diario (manha)

on:
  schedule:
    # 09:30 UTC = 06:30 (Brasilia, UTC-3)
    - cron: "30 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  postar-carrossel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install requests pillow

      - name: Gerar slides do carrossel
        run: python bot.py carrossel

      - name: Commitar imagens
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add imagens/
          git commit -m "slides carrossel" || echo "nada para commitar"
          git push

      - name: Publicar no Instagram
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          REPO_RAW_BASE: https://raw.githubusercontent.com/${{ github.repository }}/main
        run: python bot.py carrossel
