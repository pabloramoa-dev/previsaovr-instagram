name: Postar previsao no Instagram

on:
  schedule:
    - cron: "0 11 * * *"
    - cron: "30 20 * * *"
  workflow_dispatch:
    inputs:
      modo:
        description: "diario, amanha ou semanal"
        default: "diario"

permissions:
  contents: write

jobs:
  postar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install requests pillow

      - name: Definir modos
        id: modos
        run: |
          if [ -n "${{ github.event.inputs.modo }}" ]; then
            echo "lista=${{ github.event.inputs.modo }}" >> "$GITHUB_OUTPUT"
          elif [ "$(date -u +%H)" -ge 20 ]; then
            echo "lista=amanha" >> "$GITHUB_OUTPUT"
          elif [ "$(date -u +%u)" = "7" ]; then
            echo "lista=diario semanal" >> "$GITHUB_OUTPUT"
          else
            echo "lista=diario" >> "$GITHUB_OUTPUT"
          fi

      - name: Gerar imagens
        run: |
          for m in ${{ steps.modos.outputs.lista }}; do python bot.py "$m"; done

      - name: Commitar imagens
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add imagens/
          git commit -m "cards" || echo "nada para commitar"
          git push

      - name: Publicar no Instagram
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          REPO_RAW_BASE: https://raw.githubusercontent.com/${{ github.repository }}/main
        run: |
          for m in ${{ steps.modos.outputs.lista }}; do python bot.py "$m"; done
